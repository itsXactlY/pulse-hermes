name: PULSE CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run unit tests
        run: python3 tests/test_basic.py

      - name: Test CLI (diagnose)
        run: python3 scripts/pulse.py --diagnose

      - name: Test CLI (quick search)
        timeout-minutes: 2
        run: python3 scripts/pulse.py "test query" --depth quick --no-progress

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Check imports
        run: |
          python3 -c "
          import sys
          sys.path.insert(0, 'scripts')
          from lib import schema, dates, config, planner, normalize, score, dedupe, fusion, cluster, render, pipeline, cache, store, ui, setup
          print('All modules import OK')
          "

      - name: Check for hardcoded paths
        run: |
          if grep -r "~/projects/" scripts/ SKILL.md README.md 2>/dev/null; then
            echo "ERROR: Hardcoded paths found"
            exit 1
          fi
          echo "No hardcoded paths found"
